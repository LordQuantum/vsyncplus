<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trending Movies and TV Shows</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background-color: #303030;
      color: #ffffff;
    }

    header {
      background-color: #3F51B5;
      padding: 20px;
      text-align: center;
    }

    h1 {
      margin: 0;
    }

    main {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      padding: 20px;
    }

    .media-card {
      width: 300px;
      background-color: #212121;
      border-radius: 10px;
      overflow: hidden;
      margin: 10px;
      cursor: pointer;
      transition: transform 0.3s, box-shadow 0.3s;
      box-shadow: 0px 2px 6px rgba(0, 0, 0, 0.3);
    }

    .media-card:hover {
      transform: translateY(-5px);
      box-shadow: 0px 5px 15px rgba(0, 0, 0, 0.3);
      border: 2px solid #3F51B5;
    }

    .poster {
      width: 100%;
      height: auto;
      border-radius: 10px 10px 0 0;
    }

    .card-content {
      padding: 10px;
    }

    .title {
      font-weight: bold;
      margin: 10px 0;
      color: #ffffff;
      text-align: center;
    }

    .media-type {
      font-size: 14px;
      color: #ccc;
      text-align: center;
    }

    .ratings {
      margin-top: 10px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .rating-value {
      font-size: 16px;
      font-weight: bold;
      margin-right: 5px;
    }

    .star-icon {
      color: gold;
    }

    #loader {
      text-align: center;
      margin-top: 20px;
    }
  </style>
</head>

<body>
  <header>
    <h1>💡Trending Movies and TV Show💡</h1>
  </header>
  <main id="media-container"></main>
  <div id="loader">
    <img src="loader.gif" alt="Loading...">
  </div>
  <script>
    const apiKey = '5d4114c542ee8bc4e5c6f38f5f2306cb';
    let page = 1;
    let isLoading = false;

    async function getTrendingMedia(mediaType, page) {
      try {
        const response = await fetch(`https://api.themoviedb.org/3/trending/${mediaType}/week?api_key=${apiKey}&page=${page}`);
        const data = await response.json();
        return data.results;
      } catch (error) {
        console.error(error);
        return [];
      }
    }

    function createMediaCard(media) {
      const container = document.getElementById('media-container');

      const card = document.createElement('div');
      card.className = 'media-card';

      const poster = document.createElement('img');
      poster.className = 'poster';
      poster.src = `https://image.tmdb.org/t/p/w500${media.poster_path}`;
      poster.alt = media.title || media.name;

      const cardContent = document.createElement('div');
      cardContent.className = 'card-content';

      const title = document.createElement('h2');
      title.className = 'title';
      title.textContent = media.title || media.name;

      const mediaType = document.createElement('div');
      mediaType.className = 'media-type';
      mediaType.textContent = media.title ? 'Movie' : 'Series';

      const ratings = document.createElement('div');
      ratings.className = 'ratings';

      const ratingValue = document.createElement('span');
      ratingValue.className = 'rating-value';
      ratingValue.textContent = media.vote_average.toFixed(1);

      const starIcon = document.createElement('span');
      starIcon.className = 'star-icon';
      starIcon.innerHTML = '&#9733;';

      ratings.appendChild(ratingValue);
      ratings.appendChild(starIcon);

      cardContent.appendChild(title);
      cardContent.appendChild(mediaType);
      cardContent.appendChild(ratings);

      card.appendChild(poster);
      card.appendChild(cardContent);

      card.addEventListener('click', () => {
        window.location.href = 'https://vsyncplus.host';
      });

      container.appendChild(card);
    }

    function showLoader() {
      const loader = document.getElementById('loader');
      loader.style.display = 'block';
    }

    function hideLoader() {
      const loader = document.getElementById('loader');
      loader.style.display = 'none';
    }

    async function loadTrendingMedia() {
      if (isLoading) return;

      isLoading = true;
      showLoader();

      const movies = await getTrendingMedia('movie', page);
      const tvShows = await getTrendingMedia('tv', page);

      const trendingMedia = [...movies, ...tvShows];

      trendingMedia.forEach(media => {
        createMediaCard(media);
      });

      page++;
      isLoading = false;
      hideLoader();
    }

    function handleScroll() {
      const { scrollTop, clientHeight, scrollHeight } = document.documentElement;
      if (scrollTop + clientHeight >= scrollHeight - 10) {
        loadTrendingMedia();
      }
    }

    window.addEventListener('scroll', handleScroll);

    loadTrendingMedia();
  </script>
</body>

</html>
